name: Collect Flight and Weather Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: CI network diagnostics (ACV)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y dnsutils traceroute iputils-ping curl
          echo "=== DNS lookup ==="
          dig +short acv.vn || true
          echo "=== traceroute (may be blocked) ==="
          traceroute -m 30 acv.vn || tracepath acv.vn || true
          echo "=== curl GET ==="
          curl -vS --max-time 20 "https://acv.vn/vi/chuyen-bay?type=arrival&arrivalStation=SGN&flightDate=$(date -I)" || true
          echo "=== curl POST proxy (HEAD only) ==="
          curl -vS --max-time 20 -X POST "https://acv.vn/api/proxy" -H "Content-Type: application/json" -d '{"url":"/api/flights/search","method":"POST","body":{"flightDate":"'"$(date -I)"'","pageIndex":1,"pageSize":1,"langCode":"vi","terminal":"T3","type":"arrival"}}' || true
      - name: Run collectors
        run: |
          python "Data Collection + Processing/collect_all.py"
